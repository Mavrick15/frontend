<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="leafBg" x1="80" y1="260" x2="240" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="50%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="90" y1="280" x2="130" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>

  <!-- Leaf stem -->
  <path d="M70 275 Q105 230 135 185" stroke="url(#stemGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Main olive leaf shape -->
