  <circle cx="225" cy="68" r="2" fill="#1a1a1a"/>
  <circle cx="232" cy="108" r="2" fill="#1a1a1a"/>
  <circle cx="220" cy="160" r="2" fill="#1a1a1a"/>

  <!-- Base hub node -->
  <circle cx="135" cy="185" r="6" fill="#1a1a1a" stroke="#4CAF50" stroke-width="2"/>
  <circle cx="135" cy="185" r="3" fill="#4CAF50"/>

  <!-- Top tip node -->
  <circle cx="190" cy="50" r="4" fill="#1a1a1a" stroke="#66BB6A" stroke-width="1.5"/>
