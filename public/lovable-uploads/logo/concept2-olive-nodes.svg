<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <linearGradient id="oliveGrad" x1="100" y1="250" x2="200" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <radialGradient id="nodeG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </radialGradient>
    <linearGradient id="stemG" x1="150" y1="50" x2="150" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- Olive shape outline (subtle fill) -->
  <ellipse cx="150" cy="165" rx="75" ry="100" fill="url(#oliveGrad)" opacity="0.12"/>

  <!-- Olive stem at top -->
  <path d="M150 65 L150 32" stroke="url(#stemG)" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="140" cy="30" rx="18" ry="8" transform="rotate(-30 140 30)" fill="#4CAF50" opacity="0.8"/>
  <ellipse cx="160" cy="28" rx="16" ry="7" transform="rotate(25 160 28)" fill="#66BB6A" opacity="0.7"/>

  <!-- Network connections forming olive shape -->
  <!-- Outer ring connections -->
  <path d="M150 68 L108 90" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M150 68 L192 90" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M108 90 L82 125" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M192 90 L218 125" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M82 125 L78 168" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M218 125 L222 168" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M78 168 L88 208" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M222 168 L212 208" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88 208 L115 238" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M212 208 L185 238" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M115 238 L150 255" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M185 238 L150 255" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Inner structure connections -->
  <path d="M108 90 L150 120" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M192 90 L150 120" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M82 125 L120 155" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M218 125 L180 155" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M150 120 L120 155" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M150 120 L180 155" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M120 155 L150 185" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M180 155 L150 185" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M78 168 L120 155" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M222 168 L180 155" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M88 208 L150 185" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M212 208 L150 185" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M150 185 L150 220" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <path d="M115 238 L150 220" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M185 238 L150 220" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Cross connections (dashed) -->
  <path d="M108 90 L192 90" stroke="#777" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <path d="M82 125 L218 125" stroke="#777" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <path d="M78 168 L222 168" stroke="#777" stroke-width="1" stroke-dasharray="4 4" opacity="0.35"/>
  <path d="M88 208 L212 208" stroke="#777" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
  <path d="M120 155 L180 155" stroke="#777" stroke-width="1" stroke-dasharray="4 4" opacity="0.35"/>

  <!-- Network nodes (forming the olive shape) -->
  <!-- Top -->
  <circle cx="150" cy="68" r="7" fill="url(#nodeG)" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="150" cy="68" r="3" fill="#4CAF50"/>

  <!-- Upper ring -->
  <circle cx="108" cy="90" r="6" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="108" cy="90" r="2.5" fill="#1a1a1a"/>
  <circle cx="192" cy="90" r="6" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="192" cy="90" r="2.5" fill="#1a1a1a"/>

  <!-- Mid-upper ring -->
  <circle cx="82" cy="125" r="6" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="82" cy="125" r="2.5" fill="#1a1a1a"/>
  <circle cx="218" cy="125" r="6" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="218" cy="125" r="2.5" fill="#1a1a1a"/>

  <!-- Middle ring -->
  <circle cx="78" cy="168" r="5.5" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="78" cy="168" r="2" fill="#1a1a1a"/>
  <circle cx="222" cy="168" r="5.5" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="222" cy="168" r="2" fill="#1a1a1a"/>

  <!-- Lower ring -->
  <circle cx="88" cy="208" r="5.5" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="88" cy="208" r="2" fill="#1a1a1a"/>
  <circle cx="212" cy="208" r="5.5" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="212" cy="208" r="2" fill="#1a1a1a"/>

  <!-- Bottom ring -->
  <circle cx="115" cy="238" r="5" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="115" cy="238" r="2" fill="#1a1a1a"/>
  <circle cx="185" cy="238" r="5" fill="url(#nodeG)" stroke="#333" stroke-width="1.5"/>
  <circle cx="185" cy="238" r="2" fill="#1a1a1a"/>

  <!-- Bottom point -->
  <circle cx="150" cy="255" r="6" fill="url(#nodeG)" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="150" cy="255" r="2.5" fill="#4CAF50"/>

  <!-- Inner nodes -->
  <circle cx="150" cy="120" r="5" fill="#1a1a1a" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="150" cy="120" r="2.5" fill="#4CAF50"/>
  <circle cx="120" cy="155" r="4.5" fill="#1a1a1a" stroke="#4CAF50" stroke-width="1.2"/>
  <circle cx="120" cy="155" r="2" fill="#4CAF50"/>
  <circle cx="180" cy="155" r="4.5" fill="#1a1a1a" stroke="#4CAF50" stroke-width="1.2"/>
  <circle cx="180" cy="155" r="2" fill="#4CAF50"/>
  <circle cx="150" cy="185" r="5" fill="#1a1a1a" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="150" cy="185" r="2.5" fill="#4CAF50"/>
  <circle cx="150" cy="220" r="4" fill="#1a1a1a" stroke="#4CAF50" stroke-width="1.2"/>
  <circle cx="150" cy="220" r="2" fill="#4CAF50"/>
</svg>
